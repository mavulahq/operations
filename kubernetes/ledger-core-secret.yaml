apiVersion: v1
kind: Secret
metadata:
  name: ledger-core-secrets
  namespace: mavula
type: Opaque
stringData:
  DATABASE_URL: REPLACE_WITH_LEDGER_CORE_APP_DATABASE_URL
  REDIS_URL: redis://redis:6379
  OIDC_ISSUER: REPLACE_WITH_HTTPS_IDENTITY_ISSUER
  OIDC_AUTHORIZATION_ENDPOINT: REPLACE_WITH_HTTPS_AUTHORIZATION_ENDPOINT
  OIDC_AUDIENCE: urn:mavula:ledger-core
  OIDC_JWKS_URI: REPLACE_WITH_TRUSTED_HTTPS_JWKS_URI
  LEDGER_CORE_METRICS_TOKEN: REPLACE_WITH_METRICS_SCRAPE_TOKEN
