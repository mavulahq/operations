apiVersion: v1
kind: Secret
metadata:
  name: workbench-secrets
  namespace: mavula
type: Opaque
stringData:
  NODE_ENV: production
  PORT: "3010"
  DATABASE_URL: postgresql://mavula:mavula_dev@postgres:5432/mavula?schema=public
  REDIS_URL: redis://redis:6379
  INTERNAL_API_KEY: REPLACE_WITH_SHARED_INTERNAL_API_KEY
  WORKBENCH_WORKER_ENABLED: "true"
  WORKBENCH_SCHEDULER_ENABLED: "true"
  WORKBENCH_QUEUES: payments,platform
  WORKBENCH_PAYMENT_PROCESS_STORE: postgres
  SETTLEMENTS_SETTLEMENT_OUTBOX_ENABLED: "false"
  SETTLEMENTS_OUTBOX_PUBLISHER_ENABLED: "false"
  SETTLEMENTS_OUTBOX_PUBLISHER_POLL_MS: "1000"
  SETTLEMENTS_OUTBOX_PUBLISHER_BATCH_SIZE: "25"
  SETTLEMENTS_OUTBOX_PUBLISHER_LEASE_MS: "30000"
  SETTLEMENTS_RECONCILIATION_LIMIT: "100"
