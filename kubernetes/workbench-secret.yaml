apiVersion: v1
kind: Secret
metadata:
  name: workbench-secrets
  namespace: mavula
type: Opaque
stringData:
  NODE_ENV: production
  PORT: "3010"
  WORKBENCH_DATABASE_URL: REPLACE_WITH_WORKBENCH_APP_DATABASE_URL
  SETTLEMENTS_DATABASE_URL: REPLACE_WITH_SETTLEMENTS_APP_DATABASE_URL
  LEGACY_CONNECTORS_DATABASE_URL: REPLACE_WITH_LEGACY_CONNECTORS_RUNTIME_DATABASE_URL
  REDIS_URL: redis://redis:6379
  OIDC_ISSUER: REPLACE_WITH_HTTPS_IDENTITY_ISSUER
  OIDC_AUDIENCE: urn:mavula:workbench
  OIDC_JWKS_URI: REPLACE_WITH_TRUSTED_HTTPS_JWKS_URI
  OIDC_TOKEN_ENDPOINT: REPLACE_WITH_HTTPS_TOKEN_ENDPOINT
  WORKBENCH_OIDC_CLIENT_ID: REPLACE_WITH_WORKBENCH_CLIENT_ID
  WORKBENCH_PRIVATE_JWK_JSON: REPLACE_WITH_PRIVATE_CLIENT_JWK_JSON
  LEDGER_CORE_AUDIENCE: urn:mavula:ledger-core
  WORKBENCH_WORKER_ENABLED: "true"
  WORKBENCH_SCHEDULER_ENABLED: "true"
  WORKBENCH_QUEUES: payments,platform,legacy
  WORKBENCH_PAYMENT_PROCESS_STORE: postgres
  WORKBENCH_LEGACY_BATCH_STORE: postgres
  WORKBENCH_JOB_RECEIPT_STORE: postgres
  WORKBENCH_JOB_RECEIPT_RETENTION_DAYS: "365"
  SETTLEMENTS_OUTBOX_ENABLED: "false"
  SETTLEMENTS_OUTBOX_PUBLISHER_ENABLED: "false"
  SETTLEMENTS_OUTBOX_PUBLISHER_POLL_MS: "1000"
  SETTLEMENTS_OUTBOX_PUBLISHER_BATCH_SIZE: "25"
  SETTLEMENTS_OUTBOX_PUBLISHER_LEASE_MS: "30000"
  SETTLEMENTS_RECONCILIATION_LIMIT: "100"
