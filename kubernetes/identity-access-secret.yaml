apiVersion: v1
kind: Secret
metadata:
  name: identity-access-secrets
  namespace: mavula
type: Opaque
stringData:
  NODE_ENV: production
  PORT: "3020"
  DATABASE_URL: REPLACE_WITH_IDENTITY_DATABASE_URL
  IDENTITY_ISSUER: REPLACE_WITH_HTTPS_IDENTITY_ISSUER
  IDENTITY_JWKS_JSON: REPLACE_WITH_PRIVATE_JWKS_JSON
  IDENTITY_COOKIE_KEYS: REPLACE_WITH_COMMA_SEPARATED_COOKIE_KEYS
  IDENTITY_AUDIENCE: urn:mavula:identity-access
  IDENTITY_TRUST_PROXY_HOPS: "1"
  IDENTITY_RESOURCE_AUDIENCES: urn:mavula:identity-access,urn:mavula:ledger-core,urn:mavula:workbench
