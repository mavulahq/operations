apiVersion: v1
kind: Secret
metadata:
  name: fwk-secrets
  namespace: getfluxo
type: Opaque
stringData:
  NODE_ENV: production
  PORT: "3010"
  DATABASE_URL: postgresql://getfluxo:getfluxo_dev@postgres:5432/getfluxo?schema=public
  REDIS_URL: redis://redis:6379
  INTERNAL_API_KEY: REPLACE_WITH_SHARED_INTERNAL_API_KEY
  FWK_WORKER_ENABLED: "true"
  FWK_SCHEDULER_ENABLED: "true"
  FWK_QUEUES: payments,platform
