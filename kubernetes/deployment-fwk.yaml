apiVersion: apps/v1
kind: Deployment
metadata:
  name: fwk
  namespace: getfluxo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fwk
  template:
    metadata:
      labels:
        app: fwk
    spec:
      containers:
        - name: fwk
          image: getfluxio/fwk:latest
          ports:
            - containerPort: 3010
          envFrom:
            - secretRef:
                name: fwk-secrets
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3010
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/status
              port: 3010
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
