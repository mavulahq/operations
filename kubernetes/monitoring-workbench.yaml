apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: workbench-metrics
  namespace: mavula
  labels:
    app: workbench
spec:
  selector:
    matchLabels:
      app: workbench
  endpoints:
    - port: metrics
      interval: 30s
      path: /api/metrics
      bearerTokenSecret:
        name: workbench-metrics-secrets
        key: WORKBENCH_METRICS_TOKEN
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: workbench-alerts
  namespace: mavula
spec:
  groups:
    - name: workbench
      interval: 30s
      rules:
        - alert: FwkWorkerDown
          expr: workbench_worker_running == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "workbench worker is down"
            description: "Worker runtime has not reported a running state for 5 minutes."

        - alert: FwkDeadLetterBacklog
          expr: workbench_queue_dead_letter > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "workbench dead-letter queue has jobs"
            description: "Dead-letter jobs require operator review."

        - alert: FwkPaymentProcessFailed
          expr: workbench_payment_process_failed > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "workbench payment processes failed"
            description: "Failed payment processes require reconciliation review."

        - alert: FwkPaymentProcessExpired
          expr: workbench_payment_process_expired > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "workbench payment processes expired"
            description: "Expired payment processes require provider-state review."

        - alert: FwkPaymentProcessCompensationRequired
          expr: workbench_payment_process_compensation_required > 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "workbench payment compensation required"
            description: "Payment processes reached an inconsistent terminal state."

        - alert: FwkPaymentOutboxBacklog
          expr: workbench_payment_outbox_pending > 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "workbench payment outbox backlog"
            description: "Pending payment outbox events require publisher validation."

        - alert: FwkPaymentOutboxPublishingStalled
          expr: workbench_payment_outbox_publishing > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "workbench payment outbox publisher stalled"
            description: "Leased payment outbox events were not published within the expected window."

        - alert: FwkPaymentOutboxFailed
          expr: workbench_payment_outbox_failed > 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "workbench payment outbox events failed"
            description: "Payment settlement domain events reached terminal publication failure."

        - alert: WorkbenchLegacyBatchBacklog
          expr: workbench_queue_queued{queue="legacy"} > 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "workbench legacy batch backlog"
            description: "Legacy interoperability jobs have remained queued for 15 minutes."

        - alert: WorkbenchLegacyBatchProcessingStalled
          expr: workbench_legacy_batch_processing > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "workbench legacy batch processing is stalled"
            description: "A leased legacy batch has remained in processing state beyond its expected execution window."

        - alert: WorkbenchLegacyBatchRejected
          expr: workbench_legacy_batch_rejected > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "workbench legacy batches rejected"
            description: "Rejected legacy batches require compliance operator review."

        - alert: WorkbenchLegacyBatchFailed
          expr: workbench_legacy_batch_failed > 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "workbench legacy batches failed"
            description: "Legacy batches exhausted their processing attempts."
