apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager
  namespace: mavula
spec:
  provider:
    aws:
      service: SecretsManager
      region: eu-west-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ledger-core-secrets
  namespace: mavula
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: ledger-core-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: mavula/ledger-core/database_url
    - secretKey: JWT_SECRET
      remoteRef:
        key: mavula/ledger-core/jwt_secret
    - secretKey: REDIS_URL
      remoteRef:
        key: mavula/redis_url
    - secretKey: COOKIE_DOMAIN
      remoteRef:
        key: mavula/ledger-core/cookie_domain
    - secretKey: INTERNAL_API_KEY
      remoteRef:
        key: mavula/internal_api_key
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: workbench-secrets
  namespace: mavula
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: workbench-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: mavula/ledger-core/database_url
    - secretKey: REDIS_URL
      remoteRef:
        key: mavula/redis_url
    - secretKey: INTERNAL_API_KEY
      remoteRef:
        key: mavula/internal_api_key
