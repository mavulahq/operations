apiVersion: apps/v1
kind: Deployment
metadata:
  name: ledger-core
  namespace: mavula
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ledger-core
  template:
    metadata:
      labels:
        app: ledger-core
    spec:
      initContainers:
        - name: wait-for-platform-dependencies
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z postgres 5432 && nc -z redis 6379 && wget -q -O /dev/null http://identity-access/health; do sleep 2; done
      containers:
        - name: ledger-core
          image: mavula/ledger-core:latest
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: ledger-core-secrets
            - secretRef:
                name: ledger-core-metrics-secrets
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
