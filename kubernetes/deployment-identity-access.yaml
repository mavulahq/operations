apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-access
  namespace: mavula
spec:
  replicas: 1
  selector:
    matchLabels:
      app: identity-access
  template:
    metadata:
      labels:
        app: identity-access
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: [sh, -c, "until nc -z postgres 5432; do sleep 2; done"]
      containers:
        - name: identity-access
          image: mavula/identity-access:latest
          ports:
            - containerPort: 3020
          envFrom:
            - secretRef:
                name: identity-access-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 3020
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 3020
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
