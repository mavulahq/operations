apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: getfluxo
resources:
  - base/namespace.yaml
  - base/service-fengine.yaml
  - base/service-fwk.yaml
  - base/deployment-fengine.yaml
  - base/deployment-fwk.yaml
  - postgres.yaml
  - redis.yaml
generatorOptions:
  disableNameSuffixHash: true
secretGenerator:
  - name: fengine-secrets
    literals:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_URL=postgresql://getfluxo:getfluxo_dev@postgres:5432/getfluxo?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=minikube-development-secret-change-before-production
      - INTERNAL_API_KEY=minikube-internal-api-key-change-before-production
  - name: fwk-secrets
    literals:
      - NODE_ENV=development
      - PORT=3010
      - DATABASE_URL=postgresql://getfluxo:getfluxo_dev@postgres:5432/getfluxo?schema=fpay
      - REDIS_URL=redis://redis:6379
      - FWK_WORKER_ENABLED=true
      - FWK_SCHEDULER_ENABLED=true
      - FWK_QUEUES=payments,platform
      - FWK_PAYMENT_PROCESS_STORE=postgres
      - FPAY_SETTLEMENT_OUTBOX_ENABLED=false
      - FPAY_RECONCILIATION_LIMIT=100
      - INTERNAL_API_KEY=minikube-internal-api-key-change-before-production
images:
  - name: getfluxio/fengine
    newTag: minikube
  - name: getfluxio/fwk
    newTag: minikube
patches:
  - target:
      kind: Deployment
      name: fengine
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: add
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: IfNotPresent
  - target:
      kind: Deployment
      name: fwk
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: add
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: IfNotPresent
