apiVersion: apps/v1
kind: Deployment
metadata:
  name: workbench
  namespace: mavula
spec:
  replicas: 2
  selector:
    matchLabels:
      app: workbench
  template:
    metadata:
      labels:
        app: workbench
    spec:
      initContainers:
        - name: wait-for-platform-dependencies
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z postgres 5432 && nc -z redis 6379 && wget -q -O /dev/null http://identity-access/health && wget -q -O /dev/null http://ledger-core/api/health; do sleep 2; done
      containers:
        - name: workbench
          image: mavula/workbench:latest
          ports:
            - containerPort: 3010
          envFrom:
            - secretRef:
                name: workbench-secrets
          env:
            - name: LEDGER_CORE_URL
              value: http://ledger-core
            - name: WORKBENCH_JOB_RECEIPT_STORE
              value: postgres
            - name: WORKBENCH_PAYMENT_PROCESS_STORE
              value: postgres
            - name: WORKBENCH_LEGACY_BATCH_STORE
              value: postgres
            - name: WORKBENCH_QUEUES
              value: payments,platform,legacy
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3010
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3010
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
