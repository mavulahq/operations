apiVersion: v1
kind: Service
metadata:
  name: ledger-core
  namespace: mavula
  labels:
    app: ledger-core
spec:
  selector:
    app: ledger-core
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 3000
    - name: metrics
      protocol: TCP
      port: 9090
      targetPort: 3000
  type: ClusterIP
