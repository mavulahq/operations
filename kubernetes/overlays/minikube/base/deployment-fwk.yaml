apiVersion: apps/v1
kind: Deployment
metadata:
  name: fwk
  namespace: getfluxo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fwk
  template:
    metadata:
      labels:
        app: fwk
    spec:
      initContainers:
        - name: wait-for-platform-dependencies
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z postgres 5432 && nc -z redis 6379 && wget -q -O /dev/null http://fengine/api/health; do sleep 2; done
      containers:
        - name: fwk
          image: getfluxio/fwk:latest
          ports:
            - containerPort: 3010
          envFrom:
            - secretRef:
                name: fwk-secrets
          env:
            - name: FENGINE_URL
              value: http://fengine
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3010
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/status
              port: 3010
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
