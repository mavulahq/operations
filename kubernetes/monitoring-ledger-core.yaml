apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ledger-core-metrics
  namespace: mavula
  labels:
    app: ledger-core
spec:
  selector:
    matchLabels:
      app: ledger-core
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: ledger-core-alerts
  namespace: mavula
spec:
  groups:
    - name: ledger-core
      interval: 30s
      rules:
        - alert: FengineHighErrorRate
          expr: |
            rate(http_requests_total{job="ledger-core", status=~"5.."}[5m]) > 0.05
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "ledger-core high error rate (instance: {{ $labels.instance }})"
            description: "Error rate > 5% for 5 minutes. Current: {{ $value }}"

        - alert: FengineSlowRequests
          expr: |
            histogram_quantile(0.99, rate(http_request_duration_seconds_bucket{job="ledger-core"}[5m])) > 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "ledger-core slow requests (instance: {{ $labels.instance }})"
            description: "p99 latency > 1s. Current: {{ $value }}s"

        - alert: FengineHighMemory
          expr: |
            container_memory_usage_bytes{pod=~"ledger-core-.*"} / container_spec_memory_limit_bytes > 0.8
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "ledger-core high memory (pod: {{ $labels.pod }})"
            description: "Memory usage > 80% of limit. Current: {{ $value | humanizePercentage }}"
